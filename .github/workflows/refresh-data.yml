name: Refresh RFC data

on:
  schedule:
    - cron: '0 6 1 * *'  # 1st of every month at 6am UTC
  workflow_dispatch:       # also triggerable manually from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Fetch latest RFC index
        run: npm run data:fetch

      - name: Generate summaries for new RFCs
        run: npm run data:summaries
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit updated data (if any changes)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: refresh RFC data'
          file_pattern: src/lib/data/
